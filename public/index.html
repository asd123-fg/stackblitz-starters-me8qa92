<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
  </head>
  <body>
    <h1>Students</h1>
    <button onclick="loadStudents()">Display Students</button>
    <ul id="list"></ul>

    <h1>Add Student</h1>
    <input type="text" id="name" placeholder="type your name here"/>
    <input type="number" id="yearLevel" placeholder="type your yearLevel here"/>
    <button onclick="addStudent()">Submit</button>
  </body>

  <script>
    async function loadStudents() {
      const res = await fetch('http://localhost:3000/api/students')
      const data = await res.json()

      const list = document.getElementById('list')
      list.innerHTML = ''

      data.forEach((student) => {
        const li = document.createElement('li')
        li.textContent = `NAME: ${student.name} | YEAR LEVEL: ${student.yearLevel}`
        list.appendChild(li)
      })
    }

    async function addStudent() {
      const name = document.getElementById('name').value
      const yearLevel = document.getElementById('yearLevel').value

      const res = await fetch('http://localhost:3000/api/students', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ name, yearLevel })
      })

      const data = await res.json()
      console.log(data)

      loadStudents()
    }
  </script>
</html>
